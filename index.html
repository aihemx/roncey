<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Competitor Post Analyzer</title>
<style>
:root{
  --bg1:#0b1220;
  --bg2:#0a2a3d;
  --glass:rgba(255,255,255,.10);
  --stroke:rgba(255,255,255,.18);
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.65);
  --radius:22px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text);
  background:
  radial-gradient(circle at 20% 10%,rgba(56,189,248,.35),transparent 60%),
  radial-gradient(circle at 80% 20%,rgba(167,139,250,.30),transparent 60%),
  linear-gradient(140deg,var(--bg1),var(--bg2));
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 15px;
}
.card{
  width:100%;
  max-width:850px;
  border-radius:var(--radius);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  background:var(--glass);
  border:1px solid var(--stroke);
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,.45);
}
h1{margin:0;font-size:24px}
.company{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sub{color:var(--muted);margin-top:8px;font-size:14px}
.form-group{margin-top:18px}
label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
input,select{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.25);
  color:white;
  font-size:14px;
}
input::placeholder{color:rgba(255,255,255,.4)}
input:focus,select:focus{
  outline:none;
  border-color:rgba(56,189,248,.6);
}
.toggle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-radius:14px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.2);
}
button{
  margin-top:20px;
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#a78bfa);
  color:white;
}
button:hover{opacity:.95}
.status{
  margin-top:15px;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  font-size:13px;
}
footer{
  margin-top:25px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}
footer strong{color:white}
</style>
</head>
<body>

<div class="card">
  <div class="company">Roncey</div>
  <h1>Competitor Post Analyzer</h1>
  <div class="sub">AI-powered competitor content intelligence system.</div>

  <form id="analysisForm">

    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" id="email" required placeholder="your@email.com">
    </div>

    <div class="form-group">
      <label>Facebook Page URL *</label>
      <input type="url" id="pageUrl" required placeholder="https://www.facebook.com/TIC.Libya">
    </div>

    <div class="form-group">
      <label>Number of Posts *</label>
      <input type="number" id="resultsLimit" min="1" max="20" value="5" required>
    </div>

    <div class="form-group">
      <label>Analysis Mode</label>
      <select id="analysisMode">
        <option value="basic">Basic</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>

    <div class="form-group">
      <div class="toggle">
        <span>Include Full Caption Text</span>
        <input type="checkbox" id="captionText">
      </div>
    </div>

    <button type="submit">Start Analysis</button>
    <div class="status" id="statusMessage">Awaiting submission...</div>

  </form>

  <footer>
    <span>© Roncey</span>
    <span>Designed by <strong>Ayham Shehoub</strong></span>
  </footer>
</div>

<script>
document.getElementById("analysisForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const status = document.getElementById("statusMessage");

  const email = document.getElementById("email").value.trim();
  const pageUrl = document.getElementById("pageUrl").value.trim();
  const resultsLimit = parseInt(document.getElementById("resultsLimit").value);
  const captionText = document.getElementById("captionText").checked;
  const analysisMode = document.getElementById("analysisMode").value;

  if(!email || !pageUrl){
    status.innerText="❌ Please complete all required fields.";
    return;
  }

  status.innerText="Processing request...";

  const payload={
    email:email,
    captionText:captionText,
    resultsLimit:resultsLimit,
    analysisMode:analysisMode,
    startUrls:[{url:pageUrl}]
  };

  try{
    const response=await fetch("https://n8n.srv1156892.hstgr.cloud/webhook/8428b75f-319f-491a-b690-04eff3fec6ac",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });

    if(response.ok){
      status.innerText="✅ Request received successfully. The report will be sent to your email shortly.";
    }else{
      status.innerText="❌ Failed to send request.";
    }

  }catch(err){
    status.innerText="❌ Error connecting to server.";
  }
});
</script>

</body>
</html>
